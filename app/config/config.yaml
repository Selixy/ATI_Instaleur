applications:
  # ======================
  # DÉVELOPPEMENT
  # ======================

  - name: "Visual Studio Code"
    description: "Éditeur de code source léger et puissant"
    category: "Développement"
    icon: ""
    enabled: true
    has_versions: true
    default_version_index: 0
    versions:
      - name: "Stable (Recommandé)"
        version: "stable"
        methods:
          - type: "exe"
            url: "https://code.visualstudio.com/sha/download?build=stable&os=win32-x64"
            silent_args: "/verysilent /norestart /mergetasks=!runcode"
            priority: 1
      - name: "Insiders (Beta)"
        version: "insiders"
        methods:
          - type: "exe"
            url: "https://code.visualstudio.com/sha/download?build=insiders&os=win32-x64"
            silent_args: "/verysilent /norestart /mergetasks=!runcode"
            priority: 1

  - name: "Git"
    description: "Système de contrôle de version décentralisé"
    category: "Développement"
    icon: ""
    enabled: true
    methods:
      - type: "exe"
        url: "https://github.com/git-for-windows/git/releases/latest/download/Git-2.47.1-64-bit.exe"
        silent_args: "/VERYSILENT /NORESTART /NOCANCEL /SP- /CLOSEAPPLICATIONS /RESTARTAPPLICATIONS /COMPONENTS=ext,ext\\shellhere,ext\\guihere,gitlfs,assoc,assoc_sh"
        priority: 1


  - name: "Visual Studio"
    description: "Environnement de développement intégré (IDE) pour Windows"
    category: "Développement"
    icon: ""
    enabled: true
    methods:
      - type: "exe"
        url: "https://aka.ms/vs/17/release/vs_Community.exe"
        silent_args: "--nocache --wait --noUpdateInstaller --noWeb --allWorkloads --includeRecommended --includeOptional --quiet --norestart"
        priority: 1

  - name: "TortoiseGit"
    description: "Client Git pour Windows avec interface graphique"
    category: "Développement"
    icon: ""
    enabled: true
    methods:
      - type: "msi"
        url: "https://download.tortoisegit.org/tgit/2.17.0.0/TortoiseGit-2.17.0.2-64bit.msi"
        silent_args: "REBOOT=ReallySuppress /quiet /norestart"
        priority: 1
        note: "MSI avec installation silencieuse"

  # ======================
  # 3D/ANIMATION
  # ======================

  - name: "Blender"
    description: "Suite de création 3D libre et gratuite"
    category: "3D/Animation"
    icon: ""
    enabled: true
    has_versions: true
    default_version_index: 0
    versions:
      - name: "3.6 (Recommandé)"
        version: "3.6.17"
        methods:
          - type: "msi"
            url: "https://download.blender.org/release/Blender3.6/blender-3.6.17-windows-x64.msi"
            silent_args: "/quiet /norestart"
            priority: 1
      - name: "4.3 LTS"
        version: "4.3.2"
        methods:
          - type: "msi"
            url: "https://download.blender.org/release/Blender4.3/blender-4.3.2-windows-x64.msi"
            silent_args: "/quiet /norestart"
            priority: 1
      - name: "4.2 LTS"
        version: "4.2.3"
